name: Build and Deploy API

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Private source repository
        required: true
        type: string
      source_ref:
        description: Fully qualified source ref
        required: true
        type: string
      source_sha:
        description: Exact source commit SHA
        required: true
        type: string
      service:
        description: Service to build
        required: true
        type: string
      deploy_env:
        description: Deployment environment
        required: true
        type: string

concurrency:
  group: build-and-deploy-${{ inputs.service }}-${{ inputs.deploy_env }}
  cancel-in-progress: true

jobs:
  validate-inputs:
    name: Validate dispatch inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate required values
        shell: bash
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SERVICE: ${{ inputs.service }}
          DEPLOY_ENV: ${{ inputs.deploy_env }}
        run: |
          [ "$SOURCE_REPO" = "DearVinking/Astrionyx" ] || { echo "Unexpected source_repo: $SOURCE_REPO"; exit 1; }
          [ "$SOURCE_REF" = "refs/heads/main" ] || { echo "Unexpected source_ref: $SOURCE_REF"; exit 1; }
          [ "$SERVICE" = "api" ] || { echo "Unexpected service: $SERVICE"; exit 1; }
          [ -n "$SOURCE_SHA" ] || { echo "source_sha is required"; exit 1; }
          printf '%s' "$SOURCE_SHA" | grep -Eiq '^[0-9a-f]{40}$' || { echo "source_sha must be a full 40-character commit SHA"; exit 1; }
          [ "$DEPLOY_ENV" = "production" ] || { echo "Unexpected deploy_env: $DEPLOY_ENV"; exit 1; }

  build-and-push:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    needs: validate-inputs
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_sha }}
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          fetch-depth: 1
          path: source

      - name: Verify checked out revision
        shell: bash
        run: |
          cd source
          ACTUAL_SHA="$(git rev-parse HEAD)"
          echo "Checked out $ACTUAL_SHA"
          [ "$ACTUAL_SHA" = "${{ inputs.source_sha }}" ] || { echo "Checked out unexpected SHA"; exit 1; }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA
        id: vars
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          echo "short_sha=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/dearvinking/astrionyx-api
            ${{ secrets.DOCKERHUB_USERNAME }}/astrionyx-api
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: source/apps/api
          file: source/apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.deploy_env }}
    steps:
      - name: Deploy API over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 5m
          script: |
            set -e
            cd $HOME/astrionyx
            docker compose -f docker-compose.api.yml pull
            docker compose -f docker-compose.api.yml up -d --remove-orphans
            docker image prune -f
